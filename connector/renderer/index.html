<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>BillHippo Connector</title>
    <style>
      :root { --blue: #4c2de0; }
      * { box-sizing: border-box; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
      body { margin: 0; padding: 24px; background: #f8fafc; color: #1e293b; }
      h1 { font-size: 18px; margin: 0 0 4px; }
      p.sub { color: #64748b; font-size: 13px; margin: 0 0 20px; }
      .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 18px; margin-bottom: 16px; }
      label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #334155; }
      input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; }
      .row { display: flex; gap: 10px; }
      .row > div { flex: 1; }
      button { width: 100%; margin-top: 12px; padding: 11px; border: 0; border-radius: 12px; background: var(--blue); color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; }
      button.secondary { background: #e2e8f0; color: #334155; }
      button:disabled { opacity: .5; cursor: default; }
      .status { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: #cbd5e1; }
      .dot.on { background: #10b981; }
      .msg { font-size: 12px; margin-top: 8px; min-height: 16px; }
      .msg.err { color: #e11d48; }
      .msg.ok { color: #059669; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <h1>BillHippo Connector</h1>
    <p class="sub">Bridges BillHippo and your local Tally Prime.</p>

    <div class="card">
      <div class="status"><span id="dot" class="dot"></span><span id="statusText">Checking…</span></div>
    </div>

    <div class="card" id="pairCard">
      <label for="code">Pairing code</label>
      <input id="code" placeholder="e.g. A7K2QPRT" maxlength="12" autocapitalize="characters" />
      <button id="pairBtn">Pair this PC</button>
      <div id="pairMsg" class="msg"></div>
      <p class="sub" style="margin: 10px 0 0;">Get the code from BillHippo → Accounts → Connector.</p>
    </div>

    <div class="card hidden" id="pairedCard">
      <button id="unpairBtn" class="secondary">Unpair this PC</button>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label for="host">Tally host</label>
          <input id="host" value="127.0.0.1" />
        </div>
        <div>
          <label for="port">Port</label>
          <input id="port" type="number" value="9000" />
        </div>
      </div>
      <button id="saveBtn" class="secondary">Save Tally settings</button>
      <div id="saveMsg" class="msg"></div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
