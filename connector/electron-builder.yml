# electron-builder configuration for the BillHippo Tally Connector (Windows).
# Milestone D wires real code-signing (EV/OV cert) to avoid SmartScreen warnings.
appId: in.billhippo.tallyconnector
productName: BillHippo Connector
copyright: Copyright © BillHippo

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - renderer/**/*
  - package.json

win:
  target:
    - nsis
  # Drop a 256x256 (or larger) icon at connector/build/icon.ico, then uncomment:
  # icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # Fixed installer filename (no version) so the website's "Download for Windows"
  # button can use a permanent .../releases/latest/download/<name> link.
  artifactName: BillHippo-Connector-Setup.${ext}

# Auto-update feed. electron-builder publishes the installer + latest.yml to a
# GitHub Release; electron-updater reads the same release at runtime, so an
# installed connector updates itself to the newest version on launch.
publish:
  provider: github
  owner: billhippobusiness-cpu
  repo: Billhippo2.0
  releaseType: release
