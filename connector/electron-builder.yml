# electron-builder configuration for the BillHippo Tally Connector (Windows).
# Milestone D wires real code-signing (EV/OV cert) to avoid SmartScreen warnings.
appId: in.billhippo.tallyconnector
productName: BillHippo Connector
copyright: Copyright © BillHippo

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - renderer/**/*
  - package.json

win:
  target:
    - nsis
  # icon: build/icon.ico   # add a 256x256 .ico before the first signed release

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Auto-update feed is configured in Milestone D (e.g. generic/S3/GitHub provider).
# publish:
#   provider: generic
#   url: https://downloads.billhippo.in/connector/
