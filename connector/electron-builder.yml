# electron-builder configuration for the BillHippo Tally Connector (Windows).
# Milestone D wires real code-signing (EV/OV cert) to avoid SmartScreen warnings.
appId: in.billhippo.tallyconnector
productName: BillHippo Connector
copyright: Copyright © BillHippo

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - renderer/**/*
  - package.json

win:
  target:
    - nsis
  # Drop a 256x256 (or larger) icon at connector/build/icon.ico, then uncomment:
  # icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Auto-update feed. electron-builder publishes update metadata (latest.yml) and
# the installer here; electron-updater reads from the same URL at runtime.
# Point this at wherever you host the signed installer, then `npm run dist`.
publish:
  provider: generic
  url: https://downloads.billhippo.in/connector/
